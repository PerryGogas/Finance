<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monte Carlo VaR Calculator</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; background-color: #f0f2f5; }
        .card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 450px; }
        h2 { margin-top: 0; color: #1a1a1a; font-size: 1.5rem; text-align: center; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        .input-group { margin: 15px 0; }
        label { display: block; margin-bottom: 8px; font-weight: 600; font-size: 0.9rem; color: #444; }
        input { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-size: 1rem; }
        input:focus { border-color: #3498db; outline: none; box-shadow: 0 0 5px rgba(52,152,219,0.3); }
        
        /* The Button */
        #calcBtn { width: 100%; padding: 15px; background-color: #2ecc71; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 1.1rem; font-weight: bold; margin-top: 10px; transition: background 0.2s; }
        #calcBtn:hover { background-color: #27ae60; }
        #calcBtn:active { transform: translateY(1px); }

        .results { margin-top: 25px; padding: 20px; background-color: #f8f9fa; border-radius: 8px; border: 1px solid #e9ecef; }
        .res-item { display: flex; justify-content: space-between; margin-bottom: 12px; font-size: 1.1rem; }
        .val { font-family: 'Courier New', Courier, monospace; font-weight: bold; }
        .val-1 { color: #d35400; } /* 1% VaR color */
        .val-5 { color: #2980b9; } /* 5% VaR color */
        .note { font-size: 0.75rem; color: #7f8c8d; text-align: center; margin-top: 15px; }
    </style>
</head>
<body>

<div class="card">
    <h2>VaR Calculator</h2>
    
    <div class="input-group">
        <label>Expected Mean Return (%)</label>
        <input type="number" id="mean" value="0.00" step="0.01">
    </div>
    
    <div class="input-group">
        <label>Standard Deviation (%)</label>
        <input type="number" id="stdDev" value="1.00" step="0.01">
    </div>
    
    <div class="input-group">
        <label>Number of Replications</label>
        <input type="number" id="reps" value="50000" step="1000">
    </div>

    <button id="calcBtn" onclick="runMonteCarlo()">CALCULATE VAR</button>

    <div class="results" id="results">
        <div class="res-item">
            <span>5% VaR:</span>
            <span id="var5" class="val val-5">--</span>
        </div>
        <div class="res-item">
            <span>1% VaR:</span>
            <span id="var1" class="val val-1">--</span>
        </div>
        <div class="note">
            Calculated via Monte Carlo Normal Distribution simulation.
        </div>
    </div>
</div>

<script>
    function boxMuller() {
        let u = 0, v = 0;
        while(u === 0) u = Math.random(); 
        while(v === 0) v = Math.random();
        return Math.sqrt(-2.0 * Math.log(u)) * Math.cos(2.0 * Math.PI * v);
    }

    function runMonteCarlo() {
        const mu = parseFloat(document.getElementById('mean').value) / 100;
        const sigma = parseFloat(document.getElementById('stdDev').value) / 100;
        const n = parseInt(document.getElementById('reps').value);
        
        if (isNaN(mu) || isNaN(sigma) || isNaN(n) || n <= 0) {
            alert("Please enter valid numbers.");
            return;
        }

        let simulations = new Float64Array(n);

        for (let i = 0; i < n; i++) {
            simulations[i] = mu + (sigma * boxMuller());
        }

        // Sort ascending to find the "left tail"
        simulations.sort();

        const v5_idx = Math.floor(n * 0.05);
        const v1_idx = Math.floor(n * 0.01);

        const v5 = simulations[v5_idx] * 100;
        const v1 = simulations[v1_idx] * 100;

        document.getElementById('var5').innerText = v5.toFixed(4) + "%";
        document.getElementById('var1').innerText = v1.toFixed(4) + "%";
    }
</script>

</body>
</html>
